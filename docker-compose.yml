version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: volunteer-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volunteer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-volunteer_platform}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volunteer-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-volunteer}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-volunteer_platform}?schema=public
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: volunteer-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
